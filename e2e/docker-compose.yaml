services:
  app:
    build:
      context: ..
    ports:
      - 8080:80
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./config.php:/var/www/phpipam/config.php:ro
  
  mariadb:
    image: mariadb:latest@sha256:e0236fc6386e7eacd9359e59d0a078bd7aa0d18280d36d13061121bedeaee903
    environment:
      MARIADB_ROOT_PASSWORD: toor
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 120s
      interval: 5s
      timeout: 5s
      retries: 3
